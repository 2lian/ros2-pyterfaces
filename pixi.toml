# This pixi.toml if for developpement and CI only
[workspace]
authors = ["Neppel Elian <elian.dev@posteo.com>"]
channels = ["conda-forge"]
name = "dev"
platforms = ["linux-64", "win-64"]
version = "0.2.0"

[pypi-dependencies]
ros2_pyterfaces = {path = ".", editable = true}
asyncio-for-robotics = ">=1.3.5, <2"
cydr = {path="./../cydr/", editable=true}
# cydr = ">=0.1.3"
cyclonedds_idl = "*"

[dependencies]
python = ">=3.10.0,<3.14"
msgspec = ">=0.20.0,<0.21"

[feature.dev.dependencies]
pytest = ">=9.0.2,<10"
pytest-asyncio = ">=1.3.0,<2"
zenohd = "*"
pyright = "*"
glow-md = "*"

[feature.humble]
channels = ["https://prefix.dev/robostack-humble"]

[feature.humble.activation.env]
ROS_DISTRO="humble"

[feature.humble.dependencies]
ros-humble-ros-core = "*"
ros-humble-ros2cli = "*"
ros-humble-rclpy = "*"
ros-humble-common-interfaces = "*"
ros-humble-rmw-cyclonedds-cpp = "*"
ros-humble-rmw-zenoh-cpp = "*"

[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
ros-jazzy-ros-core = "*"
ros-jazzy-ros2cli = "*"
ros-jazzy-rclpy = "*"
ros-jazzy-common-interfaces = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"
ros-jazzy-rmw-zenoh-cpp = "*"

[feature.kilted]
channels = ["https://prefix.dev/robostack-kilted"]

[feature.kilted.dependencies]
ros-kilted-ros-core = "*"
ros-kilted-ros2cli = "*"
ros-kilted-rclpy = "*"
ros-kilted-common-interfaces = "*"
ros-kilted-rmw-cyclonedds-cpp = "*"
ros-kilted-rmw-zenoh-cpp = "*"

[environments]
default = { features = ["jazzy", "dev"] }
humble = { features = ["humble", "dev"] }
jazzy = { features = ["jazzy", "dev"] }
kilted = { features = ["kilted", "dev"] }

[feature.dev.tasks]
debug = "python -m ros2_pyterfaces.idl"
router = "RUST_LOG=debug zenohd -c ./tests/router.json5"
get_type_desc='''ros2 service call /SessionNodede782762_5b06_433f_aba5_e7f483e5ff40/get_type_description type_description_interfaces/srv/GetTypeDescription "{type_name: 'std_srvs/srv/SetBool', type_hash: 'RIHS01_abe9e4bb6b41b40e6789712c00ec8871923e089af3f667a79992a428cff2da0a', include_type_sources: true}"'''

[activation.env]
# RMW_IMPLEMENTATION="rmw_zenoh_cpp"
# RMW_IMPLEMENTATION="rmw_cyclonedds_cpp"
RMW_IMPLEMENTATION=""
ROS_DOMAIN_ID="0"
ROS_AUTOMATIC_DISCOVERY_RANGE="LOCALHOST"
ZENOH_ROUTER_CONFIG_URI="./tests/router.json5"
ZENOH_SESSION_CONFIG_URI="./tests/client.json5"
ROS_LOCALHOST_ONLY=""
