# This pixi.toml if for developpement and CI only
[workspace]
authors = ["Neppel Elian <elian.dev@posteo.com>"]
channels = ["conda-forge", "https://prefix.dev/robostack-jazzy"]
name = "dev"
platforms = ["linux-64"]
version = "0.1.0"

[pypi-dependencies]
ros2_pyterfaces = {path = ".", editable = true}
asyncio-for-robotics = ">=1.3.5, <2"

[dependencies]
python = ">=3.10.0,<3.14"
pytest = ">=9.0.2,<10"
pytest-asyncio = ">=1.3.0,<2"
# for CI
ros-jazzy-ros-core = "*"
ros-jazzy-ros2cli = "*"
ros-jazzy-rclpy = "*"
ros-jazzy-common-interfaces = "*"
ros-jazzy-rmw-cyclonedds-cpp = "*"
ros-jazzy-rmw-zenoh-cpp = "*"
zenohd = "*"
ros-jazzy-turtlesim = ">=1.8.3,<2"

[tasks]
debug = "python -m ros2_pyterfaces.idl"
test = "pytest ./tests"
router = "RUST_LOG=debug zenohd -c ./tests/router.json5"

[activation.env]
RMW_IMPLEMENTATION="rmw_zenoh_cpp"
# RMW_IMPLEMENTATION="rmw_cyclonedds_cpp"
# RMW_IMPLEMENTATION=""
ROS_DOMAIN_ID="0"
ROS_AUTOMATIC_DISCOVERY_RANGE="LOCALHOST"
ZENOH_ROUTER_CONFIG_URI="./tests/router.json5"
ZENOH_SESSION_CONFIG_URI="./tests/client.json5"
ROS_LOCALHOST_ONLY=""

